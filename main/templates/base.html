{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BestLogs</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/home.css' %}">
    <link rel="stylesheet" href="{% static 'css/add_funds.css' %}">
    <link rel="stylesheet" href="{% static 'css/wallet.css' %}">
    <link rel="stylesheet" href="{% static 'css/drawer.css' %}">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        .support-links {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }

        .support-links a {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            font-size: 22px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .whatsapp-btn {
            background-color: #25D366;
        }

        .telegram-btn {
            background-color: #0088cc;
        }
    </style>
</head>

<body>

    <!-- Drawer Overlay -->
    <div class="drawer-overlay" onclick="toggleDrawer()"></div>

    <!-- Navigation Drawer -->
    <div id="drawer" class="drawer">

        <div class="drawer-header">
            <h3>{{ user.username }}</h3>
            <p>Welcome</p>
        </div>

        <a href="{% url 'home' %}">
            <i class="fa fa-home"></i> Home
        </a>

        <a href="{% url 'services' %}">
            <i class="fa fa-layer-group"></i> Services
        </a>

        <a href="{% url 'orders' %}">
            <i class="fa fa-box"></i> Orders
        </a>

        <a href="{% url 'wallet' %}">
            <i class="fa fa-wallet"></i> Wallet
        </a>

        <a href="https://wa.me/2348012345678?text=Hello%20BestLogs%20Support%2C%20I%20need%20help." target="_blank">
            <i class="fab fa-whatsapp"></i> WhatsApp Support
        </a>

        <a href="https://t.me/yourtelegramusername" target="_blank">
            <i class="fab fa-telegram"></i> Telegram Support
        </a>

    </div>

    <!-- Topbar -->
    <div class="topbar">

        <div class="menu" onclick="toggleDrawer()">☰</div>

        <div class="app-title">
            <span class="brand-name">BestLogs</span>
        </div>

        <a href="{% url 'profile' %}">
            <div class="profile">

                {% if user.is_authenticated and user.profile.profile_picture %}
                    <img src="{{ user.profile.profile_picture.url }}" alt="Profile">
                {% else %}
                    <img src="{% static 'images/profile_icon.png' %}" alt="Profile">
                {% endif %}

            </div>
        </a>

    </div>

    <!-- PAGE CONTENT -->
    {% block content %}
    {% endblock %}

    <!-- Floating Support Buttons -->
    <div class="support-links">
        <a href="https://wa.me/message/TVVBYN4IS7SAC1" target="_blank" class="whatsapp-btn" title="WhatsApp">
            <i class="fab fa-whatsapp"></i>
        </a>

        <a href="https://t.me/BestLogsSupport" target="_blank" class="telegram-btn" title="Telegram">
            <i class="fab fa-telegram"></i>
        </a>
    </div>

    <!-- Drawer Script -->
    <script>
        function toggleDrawer() {
            const drawer = document.getElementById("drawer");
            const overlay = document.querySelector(".drawer-overlay");

            drawer.classList.toggle("active");
            overlay.classList.toggle("active");
        }
    </script>

</body>
</html>
